{% extends 'base.html' %}
{% block content %}
<div class="cartao card-sm">
    <h3>📦 Entrada de Peça no Estoque</h3>
    <form method="POST" action="{{ url_for('peca_cadastrar') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grupo-input">
            <label>Descrição da Peça:</label>
            <input type="text" name="descricao" class="input-form" placeholder="Ex: Filtro de Óleo" required>
        </div>
        <div class="flex-row">
            <div class="grupo-input flex-1">
                <label>Preço Base (R$):</label>
                <input type="number" name="preco_base" class="input-form" step="0.01" min="0" placeholder="0.00" required>
            </div>
            <div class="grupo-input flex-1">
                <label>Quantidade em Estoque:</label>
                <input type="number" name="quantidade_estoque" class="input-form" min="0" placeholder="0" required>
            </div>
        </div>
        <div style="margin-top:25px;display:flex;gap:10px;align-items:center;">
            <button type="submit" class="btn btn-blue" style="padding:10px 20px;width:auto;">Salvar</button>
            <a href="{{ url_for('peca_consultar') }}" style="background:#e2e8f0;color:#475569;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
