{% extends 'base.html' %}
{% block content %}
<div class="cartao card-sm">
    <h3>➕ Novo Usuário do Sistema</h3>
    <form method="POST" action="{{ url_for('usuario_cadastrar') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grupo-input">
            <label>Nome:</label>
            <input type="text" name="nome" class="input-form" placeholder="Nome completo" required>
        </div>
        <div class="grupo-input">
            <label>E-mail (login):</label>
            <input type="email" name="email" class="input-form" placeholder="usuario@oficina.com" required>
        </div>
        <div class="grupo-input">
            <label>Senha:</label>
            <input type="password" name="senha" class="input-form" placeholder="Mínimo 4 caracteres" required minlength="4">
        </div>
        <div class="grupo-input">
            <label>Perfil de Acesso:</label>
            <select name="perfil" class="input-form" required>
                <option value="atendente">Atendente</option>
                <option value="operador">Operador</option>
                <option value="admin">Administrador</option>
            </select>
        </div>
        <div style="margin-top:25px;display:flex;gap:10px;align-items:center;">
            <button type="submit" class="btn btn-blue" style="padding:10px 20px;width:auto;">Criar Usuário</button>
            <a href="{{ url_for('usuario_consultar') }}" style="background:#e2e8f0;color:#475569;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
