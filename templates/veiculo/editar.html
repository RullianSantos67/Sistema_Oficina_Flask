{% extends 'base.html' %}
{% block content %}
<div class="cartao card-sm">
    <h3>✏️ Editar Veículo — {{ veiculo.placa }}</h3>
    <form method="POST" action="{{ url_for('veiculo_editar', id=veiculo.id_veiculo) }}">
        <div class="grupo-input">
            <label>Proprietário:</label>
            <select name="id_cliente" class="input-form" required>
                {% for cli in clientes %}
                <option value="{{ cli.id_cliente }}" {% if cli.id_cliente == veiculo.id_cliente %}selected{% endif %}>{{ cli.nome }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="grupo-input">
            <label>Placa:</label>
            <input type="text" name="placa" class="input-form" value="{{ veiculo.placa }}" required>
        </div>
        <div class="flex-row">
            <div class="grupo-input flex-1">
                <label>Marca:</label>
                <input type="text" name="marca" class="input-form" value="{{ veiculo.marca }}" required>
            </div>
            <div class="grupo-input flex-1">
                <label>Modelo:</label>
                <input type="text" name="modelo" class="input-form" value="{{ veiculo.modelo }}" required>
            </div>
        </div>
        <div class="grupo-input">
            <label>Ano:</label>
            <input type="number" name="ano" class="input-form" value="{{ veiculo.ano }}" required>
        </div>
        <div style="margin-top:25px;display:flex;gap:10px;align-items:center;">
            <button type="submit" class="btn" style="background-color:#f59e0b;color:white;padding:10px 20px;width:auto;">Atualizar</button>
            <a href="{{ url_for('veiculo_consultar') }}" style="background:#e2e8f0;color:#475569;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
