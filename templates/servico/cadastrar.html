{% extends 'base.html' %}
{% block content %}
<div class="cartao card-sm">
    <h3>⚙️ Adicionar Serviço à Tabela</h3>
    <form method="POST" action="{{ url_for('servico_cadastrar') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="grupo-input">
            <label>Descrição do Serviço:</label>
            <input type="text" name="descricao" class="input-form" placeholder="Ex: Troca de Óleo e Filtro" required>
        </div>
        <div class="grupo-input">
            <label>Valor por Hora (R$):</label>
            <input type="number" name="valor_hora" class="input-form" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div style="margin-top:25px;display:flex;gap:10px;align-items:center;">
            <button type="submit" class="btn btn-blue" style="padding:10px 20px;width:auto;">Salvar</button>
            <a href="{{ url_for('servico_consultar') }}" style="background:#e2e8f0;color:#475569;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
